# B4 故障场景定义（与 b4_joint_data.py 硬编码逻辑一致）
# 本文件将硬编码的场景参数显式化，便于论文引用与复现。

scenarios:
  - id: 0
    name: 全通（nominal）
    probability: 0.6
    description: "所有链路可用率=1.0，算力容量=名义值"

  - id: 1
    name: 链路中断（link_failure）
    probability: 0.3
    description: "topology.txt 中 prob_failure 最高的 4 条有向边置为断链（σ=0）"
    link_failure:
      method: top_k_by_prob_failure   # 从 topology.txt prob_failure 列取 top k 条
      k: 4
      # 可选显式指定断边列表（覆盖 top_k 逻辑）：
      # explicit_edges: [[0,2], [2,0], [5,7], [7,5]]

  - id: 2
    name: 算力降额（compute_degradation）
    probability: 0.1
    description: "aggregation 角色节点所有资源维度容量降至名义值的 60%"
    compute_degradation:
      target_role: aggregation          # 仅降额 aggregation 节点
      capacity_factor: 0.60             # C_s = C_normal * 0.60（下限 max(2.0, ...)）
      # 若需降额所有节点：target_role: all

# 任务算力需求模板（3 类轮流分配）
task_w_templates:
  - {CPU: 4.0, GPU: 2.0, HBM: 8.0}     # AI 推理型
  - {CPU: 8.0, GPU: 0.5, HBM: 4.0}     # 通用计算型
  - {CPU: 2.0, GPU: 1.0, HBM: 32.0}    # HBM 密集型

# 场景概率（与 cvar_compare 对齐）
cvar:
  beta_loss: 0.95     # SLA CVaR 置信水平
  beta_sf: 0.95       # 算力未满足 CVaR 置信水平

# 需求缩放
demand_scaling:
  downscale: 2.0                 # demand_raw / (1000 * downscale)
  default_scale: 25.0            # 在换算后乘此系数（使 10 任务下链路利用率 ~40-60%）
  note: "scale=1 时链路利用率 ~4%（几乎无拥塞）；scale=25 恢复正常拥塞压力"
