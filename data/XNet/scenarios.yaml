# XNet 故障场景定义（28 节点 / 75 有向边）
# 注意：XNet topology.txt 缺失 prob_failure 列，loader 自动回退默认 prob=0.001

scenarios:
  - id: 0
    name: 全通（nominal）
    probability: 0.6
    description: "所有链路可用率=1.0，算力容量=名义值"

  - id: 1
    name: 链路中断（link_failure）
    probability: 0.3
    description: "所有边 prob=0.001（回退默认），top 8 条有向边置为断链"
    link_failure:
      method: top_k_by_prob_failure
      k: 8
      note: "因 prob_failure 列缺失，所有边 prob 回退为 0.001，断边选择近似随机"

  - id: 2
    name: 算力降额（compute_degradation）
    probability: 0.1
    description: "aggregation 角色节点所有资源维度容量降至名义值的 60%"
    compute_degradation:
      target_role: aggregation
      capacity_factor: 0.60

task_w_templates:
  - {CPU: 4.0, GPU: 2.0, HBM: 8.0}
  - {CPU: 8.0, GPU: 0.5, HBM: 4.0}
  - {CPU: 2.0, GPU: 1.0, HBM: 32.0}

cvar:
  beta_loss: 0.95
  beta_sf: 0.95

demand_scaling:
  downscale: 2.0
  default_scale: 25.0
  note: "demand 仅 24 行（原始未修改），无 prob_failure 列（已回退默认）"
